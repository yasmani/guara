<html lang="es">
<head>
     {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guara - Indumentaria Corporativa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="{% static 'biblioteca/logo/IMG-20251216-WA0012.ico' %}">
    <style>
        :root {
            --color-arena-claro: #f5e8d0;
            --color-arena-medio: #d4b98c;
            --color-arena-oscuro: #a37c4a;
            --color-texto: #333333;
            --color-blanco: #ffffff;
            --color-gris: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--color-arena-claro);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--color-texto);
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .login-box {
            background-color: var(--color-blanco);
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background-color: var(--color-arena-medio);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-icon i {
            font-size: 32px;
            color: var(--color-arena-oscuro);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-arena-oscuro);
            letter-spacing: 1px;
        }

        .logo-subtext {
            font-size: 14px;
            color: var(--color-arena-medio);
            margin-top: 5px;
        }

        .login-header h2 {
            color: var(--color-arena-oscuro);
            margin-bottom: 10px;
            font-size: 22px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-arena-oscuro);
            font-size: 14px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-arena-medio);
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1px solid var(--color-gris);
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s;
            background-color: #fcfcfc;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-arena-medio);
            box-shadow: 0 0 0 2px rgba(211, 185, 140, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--color-arena-oscuro);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--color-arena-medio);
        }

        .login-footer {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
        }

        .login-footer a {
            color: var(--color-arena-oscuro);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #d9534f;
            font-size: 13px;
            margin-top: 5px;

        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }

            .login-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
               <!--  <div class="logo-icon">
                   <i class="fas fa-tshirt"></i>

                </div>-->
                 <img width="70" height="70" src="{% static 'biblioteca/logo/IMG-20251216-WA0012.jpg' %}">

                <div class="logo-text">GUARA</div>
                <div class="logo-subtext">Indumentaria Corporativa</div>
            </div>

            <div class="login-header">
               <a href="{% url 'inicio' %}" title="Volver al inicio"> <i class="fas fa-house"></i> </a>
                <h2>Acceso al Sistema</h2>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <form action="{% url 'ingresar_guara' %}"  method="post">
                            {% csrf_token %}

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
                    </div>

                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                    </div>

                </div>

                     {% if msg %}
                <div id="passwordError" class="error-message">{{ msg | safe }}</div>
               {% endif %}
                <button type="submit" class="btn-login" id="loginButton">
                    <span id="buttonText">Iniciar Sesión</span>
                    <i id="loadingIcon" class="fas fa-spinner fa-spin" style="display: none;"></i>
                </button>
            </form>


        </div>
    </div>


</body>
</html>
